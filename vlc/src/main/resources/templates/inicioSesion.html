<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo App</title>
    <link rel="stylesheet" href="styleInicioSesion.css">
    <link rel="shortcut icon" href="img&svg/logo_chill.svg" type="image/x-icon">
</head>

<body>

    <!-- Video de fondo -->
    <video autoplay muted loop playsinline class="bg-video">
        <source src="mov_bbb.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <!-- Header -->
    <header class="top-bar">
        <div><img src="img&svg/full_logoo.svg" alt="todo_main_logo" width="140px"></div>
        <nav>
            <a href="#">Inicio</a>
            <a href="#">Features</a>
            <a href="#">Contacto</a>
        </nav>
    </header>

    <!-- Contenedor principal -->
    <main class="container">
        <section class="hero">

            <section class="hero">

                <div class="login-box">

                    <h1>Iniciar sesión</h1>

                    <p>
                        Accede a tu cuenta para gestionar tus tareas y proyectos.
                    </p>


                    <input type="email" name="email" placeholder="Correo electrónico" required>

                    
                    <input type="password" name="password" placeholder="Contraseña" required>

                    <button type="submit" class="btn btn-primary">
                        Entrar
                    </button>



                </div>

            </section>

        </section>


    </main>

    <!-- Footer -->
    <footer class="bottom-bar">
        <div>2026</div>
        <div><a href="https://github.com/Nicoaz25"><img src="img&svg/github_icon.svg" alt="github_logo"
                    width="20px"></a></div>
        <div>IES La Sénia</div>
        <div><a href="https://github.com/pabhb2-bnnuy"><img src="img&svg/github_icon.svg" alt="github_logo"
                    width="20px"></a></div>

    </footer>

</body>

</html>
