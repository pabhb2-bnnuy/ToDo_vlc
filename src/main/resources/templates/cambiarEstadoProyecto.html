<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambiar estado del proyecto</title>

    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
    <link rel="shortcut icon" th:href="@{/media/logo_chill.svg}">
</head>

<body class="text-white bg-black">

    <style>
        .bg-video {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: -1;
        }

        .glass {
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(10px);
        }

        .panel {
            background: rgba(17, 24, 39, 0.92);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .logout-btn {
            background: #ef4444;
            padding: 6px 10px;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            text-decoration: none;
            transition: 0.3s;
            font-size: 16px;
        }

        .logout-btn:hover {
            background: #dc2626;
            transform: scale(1.05);
        }

        .status-preview {
            border-radius: 16px;
            padding: 12px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 1.5rem;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>

    <video autoplay muted loop playsinline class="bg-video">
        <source th:src="@{/media/mov_bbb.mp4}" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <header class="fixed-top glass">
        <div class="container py-3 d-flex flex-wrap align-items-center justify-content-between gap-3">

            <a href="/" class="d-inline-block">
                <img th:src="@{/media/full_logoo.svg}" alt="logo" width="150">
            </a>

            <nav class="d-flex flex-wrap align-items-center gap-3">
                <a href="/menu" class="text-white text-decoration-none">
                    Mis proyectos
                </a>

                <a href="/perfil" class="text-white text-decoration-none">
                    Perfil
                </a>

                <span class="text-secondary">|</span>

                <a th:href="@{/proyecto/{id}(id=${proyecto.idproyecto})}"
                    class="btn btn-outline-light btn-sm">
                    ⬅ Volver
                </a>

                <span class="text-secondary">|</span>

                <a href="/cerrarSesion" class="logout-btn">
                    ⎋ Cerrar sesión
                </a>
            </nav>
        </div>
    </header>

    <main class="min-vh-100 d-flex align-items-center justify-content-center px-3"
        style="padding-top: 6.5rem; padding-bottom: 4rem; margin-top: 60px;">

        <div class="panel rounded-4 p-4 p-md-5 w-100 shadow-lg"
            style="max-width: 560px;">

            <div class="text-center mb-4">
                <h1 class="h3 fw-bold mb-2">
                    Cambiar estado del proyecto
                </h1>

                <p class="text-secondary mb-0"
                    th:text="${proyecto.nombre}">
                    Proyecto
                </p>
            </div>

            <div class="status-preview">
                Estado actual:
                <span th:text="${#strings.replace(proyecto.estado, '_', ' ')}">
                </span>
            </div>

            <form th:action="@{/proyecto/cambiarEstado/{id}(id=${proyecto.idproyecto})}"
                method="post">

                <div class="mb-4">

                    <label class="form-label">
                        Selecciona el nuevo estado
                    </label>

                    <select name="estado"
                        class="form-select bg-dark text-white border-secondary"
                        required>

                        <option value="">
                            Selecciona estado
                        </option>

                        <option value="PENDIENTE"
                            th:selected="${proyecto.estado == 'PENDIENTE'}">
                            PENDIENTE
                        </option>

                        <option value="EN_PROGRESO"
                            th:selected="${proyecto.estado == 'EN_PROGRESO'}">
                            EN PROGRESO
                        </option>

                        <option value="COMPLETADO"
                            th:selected="${proyecto.estado == 'COMPLETADO'}">
                            COMPLETADO
                        </option>

                    </select>
                </div>

                <div class="d-flex justify-content-between gap-3">

                    <a th:href="@{/proyecto/{id}(id=${proyecto.idproyecto})}"
                        class="btn btn-outline-light w-50">

                        Cancelar

                    </a>

                    <button type="submit"
                        class="btn btn-success fw-bold text-white w-50">

                        Guardar estado

                    </button>

                </div>

            </form>

        </div>

    </main>

</body>

</html>
