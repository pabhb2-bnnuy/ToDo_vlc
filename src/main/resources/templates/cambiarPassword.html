<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambiar contraseña</title>

    <!-- Bootstrap 5 -->
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
    <link rel="shortcut icon" th:href="@{/media/logo_chill.svg}">
</head>

<body class="text-white bg-black d-flex flex-column min-vh-100">
    <style>
        .bg-video {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: -1;
        }

        .glass {
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(10px);
        }

        .panel {
            background: rgba(15, 23, 42, 0.88);
            backdrop-filter: blur(10px);
        }

        .label-title {
            font-size: 13px;
            color: #38bdf8;
            margin-bottom: 2px;
        }

        .info-text {
            font-size: 15px;
        }

        .logout-btn {
            background: #ef4444;
            padding: 6px 10px;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            text-decoration: none;
            transition: 0.3s;
            font-size: 16px;
        }

        .logout-btn:hover {
            background: #dc2626;
            transform: scale(1.05);
        }
    </style>

    <!-- FONDO VIDEO -->
    <video autoplay muted loop playsinline class="bg-video">
        <source th:src="@{/media/mov_bbb.mp4}" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <!-- HEADER -->
    <header class="fixed-top glass">
        <div class="container py-3 d-flex flex-wrap align-items-center justify-content-between gap-3">
            <a href="/" class="d-inline-block">
                <img th:src="@{/media/full_logoo.svg}" alt="logo" width="150">
            </a>
            <nav class="d-flex flex-wrap align-items-center gap-3">
                <a href="/menu" class="text-white text-decoration-none">Mis proyectos</a>
                <a href="/perfil" class="text-white text-decoration-none">Perfil</a>
                <span class="text-secondary">|</span>
                <a href="/cerrarSesion" class="logout-btn">⎋ Cerrar sesión</a>
            </nav>
        </div>
    </header>

    <!-- CONTENIDO -->
    <main class="flex-grow-1 d-flex align-items-center justify-content-center px-3 py-5">
        <div class="panel rounded-4 p-4 w-100 shadow" style="max-width: 560px; margin-top: 80px;">
            <div class="text-center mb-4">
                <h3 class="h3 fw-bold mb-2">Cambiar contraseña</h3>
                <p class="text-secondary mb-0 small">Actualiza la contraseña de tu cuenta</p>
            </div>

            <!-- ALERTAS -->
            <div class="mb-3">
                <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
                <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
            </div>

            <form method="post" th:action="@{/cambiar-password}">
                <div class="mb-3">
                    <label class="form-label">Contraseña actual</label>
                    <input type="password" class="form-control bg-dark text-white border-secondary" name="actual"
                        required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Nueva contraseña</label>
                    <input type="password" class="form-control bg-dark text-white border-secondary" name="nueva"
                        required pattern="^(?=.*[^A-Za-z0-9]).{6,}$">
                </div>

                <div class="mb-4">
                    <label class="form-label">Repetir contraseña</label>
                    <input type="password" class="form-control bg-dark text-white border-secondary" name="repetir"
                        required pattern="^(?=.*[^A-Za-z0-9]).{6,}$">
                </div>

                <div class="d-flex justify-content-between gap-3">
                    <a href="/perfil" class="btn btn-outline-light w-50">
                        Volver al perfil
                    </a>
                    <button type="submit" class="btn btn-warning fw-bold text-dark w-50">
                        Cambiar contraseña
                    </button>
                </div>
            </form>
        </div>
    </main>
</body>

</html>
