<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Cambiar contraseña</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
</head>

<body class="bg-black text-white d-flex align-items-center justify-content-center min-vh-100">

<div class="p-4 rounded bg-dark shadow" style="width: 420px; color: white;">

    <h3 class="text-center mb-4 text-white">Cambiar contraseña</h3>

    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
    <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>

    <form method="post" th:action="@{/cambiar-password}">

        <div class="mb-3">
            <label style="color:white; display:block; margin-bottom:6px;">
                Contraseña actual
            </label>
            <input type="password"
                   name="actual"
                   class="form-control"
                   style="background:black; color:white; border:1px solid #666;"
                   required>
        </div>

        <div class="mb-3">
            <label style="color:white; display:block; margin-bottom:6px;">
                Nueva contraseña
            </label>
            <input type="password"
                   name="nueva"
                   class="form-control"
                   style="background:black; color:white; border:1px solid #666;"
                   required>
        </div>

        <div class="mb-3">
            <label style="color:white; display:block; margin-bottom:6px;">
                Repetir contraseña
            </label>
            <input type="password"
                   name="repetir"
                   class="form-control"
                   style="background:black; color:white; border:1px solid #666;"
                   required>
        </div>

        <button class="btn btn-warning w-100 fw-bold">
            Cambiar contraseña
        </button>

    </form>

    <a href="/perfil" class="btn btn-secondary w-100 mt-3">
        Volver
    </a>

</div>

</body>
</html>
