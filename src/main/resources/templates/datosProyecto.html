<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear proyecto</title>

    <!-- Bootstrap 5 -->
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">

    <!-- Favicon -->
    <link rel="shortcut icon" th:href="@{/media/logo_chill.svg}">
</head>

<body class="text-white bg-black">
    <style>
        .bg-video {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: -1;
        }

        .glass {
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(10px);
        }

        .panel {
            background: rgba(17, 24, 39, 0.9);
            backdrop-filter: blur(8px);
        }

        .logout-btn {
            background: #ef4444;
            padding: 6px 10px;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            text-decoration: none;
            transition: 0.3s;
            font-size: 16px;
        }

        .logout-btn:hover {
            background: #dc2626;
            transform: scale(1.05);
        }
    </style>

    <video autoplay muted loop playsinline class="bg-video">
        <source th:src="@{/media/mov_bbb.mp4}" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <header class="fixed-top glass">
        <div class="container py-3 d-flex flex-wrap align-items-center justify-content-between gap-3">
            <a href="/" class="d-inline-block">
                <img th:src="@{/media/full_logoo.svg}" alt="logo" width="150">
            </a>
            <nav class="d-flex flex-wrap align-items-center gap-3">
                <a href="/menu" class="text-white text-decoration-none">Mis proyectos</a>
                <a href="/perfil" class="text-white text-decoration-none">Perfil</a>
                <span class="text-secondary">|</span>
                <a href="/menu" class="btn btn-outline-light btn-sm">⬅ Inicio</a>
                <span class="text-secondary">|</span>
                <a href="/cerrarSesion" class="logout-btn">⎋ Cerrar sesión</a>
            </nav>
        </div>
    </header>

    <main class="min-vh-100 d-flex align-items-center justify-content-center px-3"
        style="padding-top: 6.5rem; padding-bottom: 4rem; margin-top: 80px;">
        <div class="panel rounded-4 p-4 p-md-5 w-100 shadow-lg" style="max-width: 560px;">
            <div class="text-center mb-4">
                <h1 class="h3 fw-bold mb-2">Crear proyecto</h1>
                <p class="text-secondary mb-0">Define detalles y límites del proyecto.</p>
            </div>

            <form action="/crearProyecto" method="post">
                <!-- NOMBRE -->
                <div class="mb-3">
                    <label class="form-label">Nombre</label>
                    <input type="text" class="form-control bg-dark text-white border-secondary" name="nombre" required>
                </div>

                <!-- DESCRIPCIÓN -->
                <div class="mb-3">
                    <label class="form-label">Descripción</label>
                    <input type="text" class="form-control bg-dark text-white border-secondary" name="descripcion"
                        required>
                </div>

                <!-- FECHA LÍMITE -->
                <div class="mb-4">
                    <label class="form-label">Fecha límite</label>
                    <input type="date" class="form-control bg-dark text-white border-secondary" name="fecha">
                </div>

                <div class="d-flex justify-content-between gap-3">
                    <a href="/menu" class="btn btn-outline-light w-50">
                        Cancelar
                    </a>
                    <button type="submit" class="btn btn-info fw-bold text-dark w-50">
                        Crear proyecto
                    </button>
                </div>
            </form>
        </div>
    </main>
</body>

</html>
