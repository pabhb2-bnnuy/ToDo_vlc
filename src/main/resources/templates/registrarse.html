<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo App</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="shortcut icon" href="img&svg/logo_chill.svg" type="image/x-icon">
</head>

<body class="text-white bg-black">
    <style>
        .bg-video {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: -1;
        }
    </style>

    <video autoplay muted loop playsinline class="bg-video">
        <source src="media/mov_bbb.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <header class="fixed-top bg-dark bg-opacity-50">
        <div class="container py-3 d-flex align-items-center">
            <a href="/" class="d-inline-block">
                <img src="media/full_logoo.svg" alt="todo_main_logo" width="140" class="img-fluid">
            </a>
        </div>
    </header>

    <main class="container min-vh-100 d-flex flex-column justify-content-between pt-5 pb-5"
          style="padding-top: 6rem !important; padding-bottom: 7.5rem !important;">
        <section class="flex-grow-1 d-flex justify-content-center align-items-center">
            <div class="card border-0 rounded-4 bg-dark bg-opacity-75 text-white w-100" style="max-width: 520px;">
                <div class="card-body p-4 p-md-5">
                    <h2 class="text-center fw-bold mb-4">Formulario de Registro</h2>

                   <form action="/register" method="post" class="mx-auto" style="max-width: 320px;">
    <div class="mb-3">
        <label for="name" class="form-label">Nombre:</label>
        <input type="text" class="form-control" name="nombre" id="name" required>
    </div>

    <div class="mb-3">
        <label for="email" class="form-label">Email:</label>
        <input type="email" class="form-control" name="mail" id="email" required>
    </div>

    <div class="mb-5">
        <label for="passwd" class="form-label">Contraseña:</label>
        <input type="password" class="form-control" name="password" id="passwd" required
               pattern="^(?=.*[^A-Za-z0-9]).{6,}$"
               title="Mínimo 6 caracteres y al menos 1 carácter especial">
    </div>

    <button type="submit" class="btn btn-info fw-bold text-dark w-100 py-2">
        Registrarse
    </button>
</form>
                </div>  
            </div>
        </section>
    </main>

    <footer class="fixed-bottom bg-dark bg-opacity-50">
        <div class="container py-4">
            <div class="d-flex justify-content-center align-items-center flex-wrap gap-3 text-white">
                <span>2026</span>

                <a href="https://github.com/Nicoaz25" target="_blank" rel="noopener"
                   class="d-inline-flex align-items-center text-white text-decoration-none gap-2">
                    <img src="media/github_icon.svg" alt="github_logo" width="20" height="20">
                </a>

                <span>IES La Sénia</span>

                <a href="https://github.com/pabhb2-bnnuy" target="_blank" rel="noopener"
                   class="d-inline-flex align-items-center text-white text-decoration-none gap-2">
                    <img src="media/github_icon.svg" alt="github_logo" width="20" height="20">
                </a>
            </div>
        </div>
    </footer>
</body>
</html>
