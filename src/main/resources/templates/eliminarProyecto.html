<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eliminar proyecto</title>

    <link rel="stylesheet"
        th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">

    <link rel="shortcut icon"
        th:href="@{/media/logo_chill.svg}">
</head>

<body class="text-white bg-black">

    <style>
        .bg-video {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: -1;
        }

        .glass {
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(10px);
        }

        .panel {
            background: rgba(17, 24, 39, 0.92);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .logout-btn {
            background: #ef4444;
            padding: 6px 10px;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            text-decoration: none;
            transition: 0.3s;
            font-size: 16px;
        }

        .logout-btn:hover {
            background: #dc2626;
            transform: scale(1.05);
        }

        .warning-box {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.35);
            border-radius: 14px;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }
    </style>

    <video autoplay muted loop playsinline class="bg-video">
        <source th:src="@{/media/mov_bbb.mp4}"
            type="video/mp4">
    </video>

    <div class="overlay"></div>

    <header class="fixed-top glass">

        <div class="container py-3 d-flex flex-wrap align-items-center justify-content-between gap-3">

            <a href="/" class="d-inline-block">
                <img th:src="@{/media/full_logoo.svg}"
                    alt="logo"
                    width="150">
            </a>

            <nav class="d-flex flex-wrap align-items-center gap-3">

                <a href="/menu"
                    class="text-white text-decoration-none">
                    Mis proyectos
                </a>

                <a href="/perfil"
                    class="text-white text-decoration-none">
                    Perfil
                </a>

                <span class="text-secondary">|</span>

                <a href="/menu"
                    class="btn btn-outline-light btn-sm">
                    ⬅ Volver
                </a>

                <span class="text-secondary">|</span>

                <a href="/cerrarSesion"
                    class="logout-btn">
                    ⎋ Cerrar sesión
                </a>

            </nav>

        </div>

    </header>

    <main class="min-vh-100 d-flex align-items-center justify-content-center px-3"
        style="padding-top: 6.5rem; padding-bottom: 4rem; margin-top: 60px;">

        <div class="panel rounded-4 p-4 p-md-5 w-100 shadow-lg"
            style="max-width: 560px;">

            <div class="text-center mb-4">

                <h1 class="h3 fw-bold mb-2">
                    Eliminar proyecto
                </h1>

                <p class="text-secondary mb-0">
                    Selecciona un proyecto para eliminar
                </p>

            </div>

            <div class="warning-box">

                ⚠ Esta acción eliminará:
                <ul class="mb-0 mt-2">
                    <li>Todas las tareas</li>
                    <li>Todo el contenido del proyecto</li>
                </ul>

            </div>

            <form th:action="@{/eliminarProyecto}"
                method="post">

                <div class="mb-4">

                    <label class="form-label">
                        Proyecto
                    </label>

                    <select name="idproyecto"
                        class="form-select bg-dark text-white border-secondary"
                        required>

                        <option value="">
                            Selecciona proyecto
                        </option>

                        <option th:each="p : ${proyectos}"
                            th:value="${p.idproyecto}"
                            th:text="${p.nombre}">
                        </option>

                    </select>

                </div>

                <div class="d-flex justify-content-between gap-3">

                    <a href="/menu"
                        class="btn btn-outline-light w-50">

                        Cancelar

                    </a>

                    <button type="submit"
                        class="btn btn-danger fw-bold w-50">

                        Eliminar proyecto

                    </button>

                </div>

            </form>

        </div>

    </main>

</body>

</html>
