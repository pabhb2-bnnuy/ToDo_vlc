<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quitar usuario</title>

    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
    <link rel="shortcut icon" th:href="@{/media/logo_chill.svg}">
</head>

<body class="text-white bg-black">
    <style>
        .bg-video {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: -1;
        }

        .glass {
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(10px);
        }

        .panel {
            background: rgba(17, 24, 39, 0.92);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .logout-btn {
            background: #ef4444;
            padding: 6px 10px;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            text-decoration: none;
            transition: 0.3s;
            font-size: 16px;
        }

        .logout-btn:hover {
            background: #dc2626;
            transform: scale(1.05);
        }

        .member-card {
            background: rgba(0, 0, 0, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 1rem;
            transition: 0.2s ease;
            cursor: pointer;
        }

        .member-card:hover {
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .empty-box {
            background: rgba(0, 0, 0, 0.35);
            border: 1px dashed rgba(255, 255, 255, 0.15);
            border-radius: 18px;
            padding: 2rem 1.5rem;
        }
    </style>

    <video autoplay muted loop playsinline class="bg-video">
        <source th:src="@{/media/mov_bbb.mp4}" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <header class="fixed-top glass">
        <div class="container py-3 d-flex flex-wrap align-items-center justify-content-between gap-3">
            <a href="/" class="d-inline-block">
                <img th:src="@{/media/full_logoo.svg}" alt="logo" width="150">
            </a>

            <nav class="d-flex flex-wrap align-items-center gap-3">
                <a href="/menu" class="text-white text-decoration-none">Mis proyectos</a>
                <a href="/perfil" class="text-white text-decoration-none">Perfil</a>
                <span class="text-secondary">|</span>
                <a th:href="@{/proyecto/{id}(id=${proyecto.idproyecto})}" class="btn btn-outline-light btn-sm">⬅ Volver</a>
                <span class="text-secondary">|</span>
                <a href="/cerrarSesion" class="logout-btn">⎋ Cerrar sesión</a>
            </nav>
        </div>
    </header>

    <main class="min-vh-100 d-flex align-items-center justify-content-center px-3" style="padding-top: 6.5rem; padding-bottom: 4rem;">
        <div class="panel rounded-4 p-4 p-md-5 w-100 shadow-lg" style="max-width: 720px;">
            <div class="text-center mb-4">
                <h1 class="h3 fw-bold mb-2">Quitar usuario del proyecto</h1>
                <p class="text-secondary mb-0" th:text="${proyecto.nombre}">Proyecto</p>
            </div>

            <div th:if="${#lists.isEmpty(miembros)}" class="empty-box text-center">
                <div class="mb-3 fs-1">👥</div>
                <h2 class="h5 fw-bold mb-2">No hay miembros para quitar</h2>
                <p class="text-secondary mb-0">Este proyecto no tiene usuarios asignados aparte del propietario.</p>
            </div>

            <form th:unless="${#lists.isEmpty(miembros)}"
                  th:action="@{/quitarUsuario/{id}(id=${proyecto.idproyecto})}" method="post">
                <div class="row g-3">
                    <div class="col-12" th:each="miembro : ${miembros}">
                        <label class="member-card w-100 d-flex align-items-center justify-content-between">
                            <div class="d-flex align-items-center gap-3">
                                <input class="form-check-input m-0" type="radio" name="idusuario"
                                       th:id="'u' + ${miembro.usuario.idusuario}"
                                       th:value="${miembro.usuario.idusuario}" required>
                                <div>
                                    <div class="fw-semibold" th:text="${miembro.usuario.nombre}"></div>
                                    <small class="text-secondary">
                                        <span th:if="${miembro.usuario.idusuario == proyecto.usuario.idusuario}">Dueño del proyecto</span>
                                        <span th:unless="${miembro.usuario.idusuario == proyecto.usuario.idusuario}">Miembro del proyecto</span>
                                    </small>
                                </div>
                            </div>
                            <span class="text-secondary">Seleccionar</span>
                        </label>
                    </div>
                </div>

                <div class="d-flex justify-content-between align-items-center gap-3 mt-4">
                    <a th:href="@{/proyecto/{id}(id=${proyecto.idproyecto})}" class="btn btn-outline-light">
                        Cancelar
                    </a>
                    <button type="submit" class="btn btn-danger fw-bold px-4">
                        Quitar usuario
                    </button>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
