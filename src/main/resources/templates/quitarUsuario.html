<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quitar usuario</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="shortcut icon" th:href="@{/media/logo_chill.svg}">
</head>

<body class="text-white bg-black">
    <style>
        .bg-video {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: -1;
        }

        .glass {
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(10px);
        }

        .panel {
            background: rgba(17, 24, 39, 0.9);
            backdrop-filter: blur(8px);
        }
    </style>

    <video autoplay muted loop playsinline class="bg-video">
        <source th:src="@{/media/mov_bbb.mp4}" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <header class="fixed-top glass">
        <div class="container py-3 d-flex flex-wrap align-items-center justify-content-between gap-3">
            <a href="/" class="d-inline-block">
                <img th:src="@{/media/full_logoo.svg}" alt="logo" width="150">
            </a>

            <nav class="d-flex flex-wrap align-items-center gap-3">
                <a href="/" class="text-white text-decoration-none">Inicio</a>
                <a href="#" class="text-white text-decoration-none">Mis proyectos</a>
                <a href="#" class="text-white text-decoration-none">Perfil</a>
                <span class="text-secondary">|</span>
                <a th:href="@{/proyecto/{id}(id=${proyecto.idproyecto})}" class="btn btn-outline-light btn-sm">⬅ Volver</a>
            </nav>
        </div>
    </header>

    <main class="container min-vh-100 d-flex align-items-center justify-content-center" style="padding-top: 6.5rem; padding-bottom: 4rem;">
        <div class="panel rounded-4 p-4 p-md-5 w-100" style="max-width: 720px;">
            <div class="text-center mb-4">
                <h1 class="h3 fw-bold mb-2">Quitar usuario del proyecto</h1>
                <p class="text-secondary mb-0" th:text="${proyecto.nombre}">Proyecto</p>
            </div>

            <div class="card border-0 rounded-4 bg-dark bg-opacity-75 text-white mb-4">
                <div class="card-body">
                    <h2 class="h5 mb-3">Miembros del proyecto</h2>

                    <div th:if="${#lists.isEmpty(miembros)}" class="text-secondary">
                        No hay miembros para quitar.
                    </div>

                    <form th:if="${!#lists.isEmpty(miembros)}" th:action="@{/quitarUsuario/{id}(id=${proyecto.idproyecto})}" method="post">
                        <div class="d-grid gap-2">
                            <div th:each="miembro : ${miembros}" class="form-check p-3 rounded-4 bg-black bg-opacity-50 border border-white border-opacity-10">
                                <input class="form-check-input" type="radio"
                                       name="idusuario"
                                       th:id="'u' + ${miembro.usuario.idusuario}"
                                       th:value="${miembro.usuario.idusuario}"
                                       required>
                                <label class="form-check-label ms-2" th:for="'u' + ${miembro.usuario.idusuario}">
                                    <span th:text="${miembro.usuario.nombre}"></span>
                                    <span th:if="${miembro.usuario.idusuario == proyecto.usuario.idusuario}">⭐ dueño</span>
                                </label>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between align-items-center gap-3 mt-4">
                            <a th:href="@{/proyecto/{id}(id=${proyecto.idproyecto})}" class="btn btn-outline-light">
                                Cancelar
                            </a>
                            <button type="submit" class="btn btn-danger fw-bold">
                                Quitar usuario
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
