<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo App</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
    <link rel="shortcut icon" href="media/logo_chill.svg" type="image/x-icon">
</head>

<body class="text-white bg-black">
    <style>
        .bg-video {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: -1;
        }
    </style>

    <video autoplay muted loop playsinline class="bg-video">
        <source src="media/work.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <header class="fixed-top bg-dark bg-opacity-50 backdrop-blur">
        <div class="container py-3 d-flex align-items-center">
            <a href="/" class="d-inline-block">
                <img src="media/full_logoo.svg" alt="todo_main_logo" width="140" class="img-fluid">
            </a>
            <div><img th:src="@{/media/feria-valencia.svg}" alt="feria_valencia_logo" width="210px"></div>
        </div>
    </header>

    <main class="container min-vh-100 d-flex flex-column justify-content-between pt-5 pb-5"
        style="padding-top: 6rem !important; padding-bottom: 7.5rem !important;">
        <section class="flex-grow-1 d-flex flex-column justify-content-center text-center">
            <h1 class="display-4 fw-bold mb-3">
                Organiza tu vida con <span class="text-info">ToDo Vlc</span>
            </h1>

            <p class="lead text-light mx-auto mb-0" style="max-width: 620px;">
                Gestiona tareas, recordatorios y mejora tu productividad desde cualquier dispositivo.
            </p>

            <div class="d-flex justify-content-center gap-3 flex-wrap mt-4">
                <a href="/registrarse" class="btn btn-info fw-bold text-dark px-4 py-2">
                    Empezar Gratis
                </a>
                <a href="/inicioSesion" class="btn btn-outline-light px-4 py-2">
                    Iniciar Sesión
                </a>
            </div>
        </section>

        <section class="row g-4 justify-content-center mt-4">
            <div class="col-12 col-md-4">
                <div class="card border-0 rounded-4 h-100 bg-dark bg-opacity-75 text-white">
                    <div class="card-body text-center py-4">
                        <h3 class="h4 fw-semibold">Rápida</h3>
                        <p class="mb-0 text-light">Interfaz optimizada y ligera.</p>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-4">
                <div class="card border-0 rounded-4 h-100 bg-dark bg-opacity-75 text-white">
                    <div class="card-body text-center py-4">
                        <h3 class="h4 fw-semibold">Segura</h3>
                        <p class="mb-0 text-light">Datos protegidos en todo momento.</p>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-4">
                <div class="card border-0 rounded-4 h-100 bg-dark bg-opacity-75 text-white">
                    <div class="card-body text-center py-4">
                        <h3 class="h4 fw-semibold">Multiplataforma</h3>
                        <p class="mb-0 text-light">Funciona en móvil y ordenador.</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="fixed-bottom bg-dark bg-opacity-50">
        <div class="container py-4">
            <div class="d-flex justify-content-center align-items-center flex-wrap gap-3 text-white">
                <span>2026</span>

                <a href="https://github.com/Nicoaz25" target="_blank" rel="noopener"
                    class="d-inline-flex align-items-center text-white text-decoration-none gap-2">
                    <img src="media/github_icon.svg" alt="github_logo" width="20" height="20">
                </a>

                <span>IES La Sénia</span>

                <a href="https://github.com/pabhb2-bnnuy" target="_blank" rel="noopener"
                    class="d-inline-flex align-items-center text-white text-decoration-none gap-2">
                    <img src="media/github_icon.svg" alt="github_logo" width="20" height="20">
                </a>
            </div>
        </div>
    </footer>
</body>

</html>
