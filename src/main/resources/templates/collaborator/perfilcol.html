<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - ToDo App</title>

    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
    <link rel="shortcut icon" th:href="@{/media/logo_chill.svg}">
</head>

<body class="text-white bg-black d-flex flex-column min-vh-100">

    <style>
        .bg-video {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: -1;
        }

        .glass {
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(10px);
        }

        .panel {
            background: rgba(15, 23, 42, 0.88);
            backdrop-filter: blur(10px);
        }

        .profile-icon {
            width: 70px;
            height: 70px;
            background: #38bdf8;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            color: black;
            margin: auto;
        }

        .info-box {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .logout-btn {
            background: #ef4444;
            padding: 6px 10px;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            text-decoration: none;
            transition: 0.3s;
            font-size: 16px;
        }

        .logout-btn:hover {
            background: #dc2626;
            transform: scale(1.05);
        }

        .label-title {
            font-size: 13px;
            color: #38bdf8;
            margin-bottom: 2px;
        }

        .info-text {
            font-size: 15px;
        }
    </style>

    <!-- VIDEO -->
    <video autoplay muted loop playsinline class="bg-video">
        <source th:src="@{/media/mov_bbb.mp4}" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <!-- HEADER -->
    <header class="fixed-top glass">
        <div class="container py-3 d-flex flex-wrap align-items-center justify-content-between gap-3">

            <a href="/menucol" class="d-inline-block">
                <img th:src="@{/media/full_logoo.svg}" alt="logo" width="150">
            </a>
            <div><img th:src="@{/media/feria-valencia.svg}" alt="feria_valencia_logo" width="210px"></div>
            <nav class="d-flex flex-wrap align-items-center gap-3">
                <a href="/menucol" class="text-white text-decoration-none">Mis proyectos</a>
                <a href="/perfilcol" class="text-info text-decoration-none fw-bold">Perfil</a>
                <span class="text-secondary">|</span>
                <a href="/cerrarSesion" class="logout-btn">⎋ Cerrar sesión</a>
            </nav>

        </div>
    </header>

    <!-- CONTENIDO -->
    <main class="flex-grow-1 d-flex align-items-center justify-content-center px-3 py-5">

        <div class="panel rounded-4 p-4 w-100 shadow" style="max-width: 500px; margin-top: 80px;">

            <!-- FOTO + NOMBRE -->
            <div class="text-center mb-4">

                <div class="profile-icon mb-2" th:text="${#strings.substring(usuario.nombre,0,1).toUpperCase()}">
                </div>

                <h3 class="fw-bold mb-1" th:text="${usuario.nombre}">
                </h3>

                <p class="text-secondary small">
                    Perfil de usuario
                </p>

            </div>

            <!-- DATOS -->
            <div class="d-grid gap-2">

                <div class="info-box p-3">
                    <div class="label-title">EMAIL</div>
                    <div class="info-text" th:text="${usuario.email}">
                    </div>
                </div>

                <div class="info-box p-3">
                    <div class="label-title">ROL</div>
                    <div class="info-text" th:text="${usuario.rol}">
                    </div>
                </div>

                <div class="info-box p-3">
                    <div class="label-title">FECHA CREACIÓN</div>

                    <div class="info-text" th:text="${usuario.fecha_creacion}">
                    </div>
                </div>

                <div class="info-box p-3">
                    <div class="label-title">ESTADO</div>

                    <span class="badge bg-success" th:if="${usuario.enabled}">
                        Activa
                    </span>

                    <span class="badge bg-danger" th:unless="${usuario.enabled}">
                        Desactivada
                    </span>
                </div>

                <div class="mt-3">
                    <a href="/cambiar-passwordcol" class="btn btn-warning fw-bold text-dark w-100">
                        Cambiar contraseña
                    </a>
                </div>

            </div>

            <!-- BOTON -->
            <div class="mt-4">
                <a href="/menucol" class="btn btn-info fw-bold text-dark w-100">
                    ← Volver al menú
                </a>
            </div>

        </div>

    </main>

</body>

</html>
