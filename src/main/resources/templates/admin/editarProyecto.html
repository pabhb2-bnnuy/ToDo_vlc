<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar proyecto</title>

    <!-- Bootstrap 5 -->
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">

    <!-- Favicon -->
    <link rel="shortcut icon" th:href="@{/media/logo_chill.svg}" type="image/x-icon">

    <!-- Estilos inline (tu estilo de admin) -->
    <style>
        :root {
            --bg-primary: #f8fafc;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --hover-bg: #f1f5f9;
            --sidebar-bg: #ffffff;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-dark);
        }

        .admin-layout {
            min-height: 100vh;
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            padding: 30px 20px;
            flex-shrink: 0;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            overflow-y: auto;
        }

        .sidebar h1 {
            font-size: 26px;
            margin-bottom: 40px;
            color: var(--text-dark);
        }

        .sidebar .nav-link {
            color: var(--text-muted);
            padding: 14px 16px;
            border-radius: 14px;
            transition: 0.2s;
            font-weight: 500;
        }

        .sidebar .nav-link:hover {
            background-color: var(--hover-bg);
            color: var(--text-dark);
        }

        /* CONTENT */
        .content {
            flex: 1;
            margin-left: 260px;
            padding: 40px;
        }

        @media (max-width: 900px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
            }

            .content {
                margin-left: 0;
                padding: 20px;
            }

            .admin-layout {
                flex-direction: column;
            }
        }

        /* CARD SECTION */
        .card-section {
            background-color: white;
            border: 1px solid var(--border-color);
            border-radius: 22px;
            padding: 28px;
            margin-top: 25px;
        }

        /* ITEM LIST / ITEM CARD */
        .item-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .item-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px;
            background-color: #f8fafc;
            border-radius: 16px;
            transition: 0.2s;
        }

        .item-card:hover {
            background-color: #f1f5f9;
        }

        .task-info {
            flex: 1;
        }

        .task-meta {
            display: inline-block;
            margin-right: 16px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .task-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
    </style>
</head>

<body class="bg-body-tertiary">

    <div class="admin-layout d-flex">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <h1>ToDo Admin</h1>

            <nav class="nav flex-column">
                <a class="nav-link" href="/admin">
                    Dashboard
                </a>
                <a class="nav-link" href="/admin/usuarios">
                    Usuarios
                </a>
                <a class="nav-link" href="/admin/proyectos">
                    Proyectos
                </a>
                <a class="nav-link" href="/menu">
                    Volver a la app
                </a>
                <a class="nav-link" href="/cerrarSesion">
                    Cerrar sesión
                </a>
            </nav>
        </aside>

        <!-- CONTENIDO -->
        <main class="content">

            <!-- HEADER -->
            <div class="page-header d-flex justify-content-between align-items-start mb-4">
                <div>
                    <h2 class="h3 fw-bold mb-1">Editar proyecto</h2>
                    <p class="mb-0">
                        Gestiona información, tareas y estado del proyecto.
                    </p>
                </div>
            </div>

            <!-- FORMULARIO -->
            <div class="card rounded-4 shadow-sm border">
                <div class="card-body">
                    <form th:action="@{/admin/editarProyecto/{id}(id=${proyecto.idproyecto})}" method="post"
                        class="row g-4">

                        <!-- NOMBRE -->
                        <div class="col-12">
                            <label class="form-label">Nombre</label>
                            <input type="text" class="form-control" name="nombre" th:value="${proyecto.nombre}"
                                required>
                        </div>

                        <!-- DESCRIPCIÓN -->
                        <div class="col-12">
                            <label class="form-label">Descripción</label>
                            <textarea class="form-control" name="descripcion" rows="3"
                                th:text="${proyecto.descripcion}">
                        </textarea>
                        </div>

                        <!-- ESTADO -->
                        <div class="col-md-6">
                            <label class="form-label">Estado</label>
                            <select class="form-select" name="estado">
                                <option value="PENDIENTE" th:selected="${proyecto.estado == 'PENDIENTE'}">PENDIENTE
                                </option>
                                <option value="EN_PROGRESO" th:selected="${proyecto.estado == 'EN_PROGRESO'}">EN
                                    PROGRESO</option>
                                <option value="FINALIZADO" th:selected="${proyecto.estado == 'FINALIZADO'}">FINALIZADO
                                </option>
                            </select>
                        </div>

                        <!-- FECHA LÍMITE -->
                        <div class="col-md-6">
                            <label class="form-label">Fecha límite</label>
                            <input type="date" class="form-control" name="fecha_limite"
                                th:value="${proyecto.fecha_limite}">
                        </div>

                        <!-- BOTÓN -->
                        <div class="col-12">
                            <button class="btn btn-primary" type="submit">
                                Guardar cambios
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- TAREAS -->
            <section class="card-section mt-4">
                <div class="section-header d-flex justify-content-between align-items-center mb-3">
                    <h3 class="h5 mb-0">Tareas del proyecto</h3>
                </div>

                <div class="item-list">
                    <div class="item-card" th:each="t : ${tareas}">
                        <!-- INFO -->
                        <div class="task-info">
                            <strong class="d-block mb-1" th:text="${t.titulo}"></strong>
                            <p class="mb-2" th:text="${t.descripcion}"></p>
                            <span class="task-meta">
                                - Usuario:
                                <span th:text="${t.usuario.nombre}"></span>
                            </span>
                            <span class="task-meta">
                                - Prioridad:
                                <span th:text="${t.prioridad}"></span>
                            </span>
                            <span class="task-meta">
                                - Estado:
                                <span th:text="${t.estado}"></span>
                            </span>
                        </div>

                        <!-- ACCIONES -->
                        <div class="task-actions">
                            <a th:href="@{/admin/tarea/{id}(id=${t.idtarea})}" class="d-inline-block">
                                <button type="button" class="btn btn-secondary btn-sm">Editar</button>
                            </a>
                            <form th:action="@{/admin/eliminarTarea/{id}(id=${t.idtarea})}" method="post"
                                class="d-inline-block">
                                <button class="btn btn-danger btn-sm">Eliminar</button>
                            </form>
                        </div>
                    </div>
                </div>
            </section>

        </main>

    </div>

</body>

</html>
