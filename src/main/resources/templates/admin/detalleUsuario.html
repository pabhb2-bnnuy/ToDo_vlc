<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle Usuario</title>

    <!-- Bootstrap 5 -->
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">

    <!-- Favicon -->
    <link rel="shortcut icon" th:href="@{/media/logo_chill.svg}" type="image/x-icon">

    <!-- Estilos inline (tu estilo de admin) -->
    <style>
        :root {
            --bg-primary: #f8fafc;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --hover-bg: #f1f5f9;
            --sidebar-bg: #ffffff;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-dark);
        }

        .admin-layout {
            min-height: 100vh;
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            padding: 30px 20px;
            flex-shrink: 0;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            overflow-y: auto;
        }

        .sidebar h1 {
            font-size: 26px;
            margin-bottom: 40px;
            color: var(--text-dark);
        }

        .sidebar .nav-link {
            color: var(--text-muted);
            padding: 14px 16px;
            border-radius: 14px;
            transition: 0.2s;
            font-weight: 500;
        }

        .sidebar .nav-link:hover {
            background-color: var(--hover-bg);
            color: var(--text-dark);
        }

        /* CONTENT */
        .content {
            flex: 1;
            margin-left: 260px;
            padding: 40px;
        }

        @media (max-width: 900px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
            }
            .content {
                margin-left: 0;
                padding: 20px;
            }
            .admin-layout {
                flex-direction: column;
            }
        }

        /* CARD SECTION */
        .card-section {
            background-color: white;
            border: 1px solid var(--border-color);
            border-radius: 22px;
            padding: 28px;
            margin-top: 25px;
        }

        /* ITEM LIST / ITEM CARD */
        .item-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .item-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px;
            background-color: #f8fafc;
            border-radius: 16px;
            transition: 0.2s;
        }
        .item-card:hover {
            background-color: #f1f5f9;
        }
    </style>
</head>

<body class="bg-body-tertiary">

<div class="admin-layout d-flex">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h1>ToDo Admin</h1>

        <nav class="nav flex-column">
            <a class="nav-link" href="/admin">
                Dashboard
            </a>
            <a class="nav-link" href="/admin/usuarios">
                Usuarios
            </a>
            <a class="nav-link" href="/admin/proyectos">
                Proyectos
            </a>
            <a class="nav-link" href="/menu">
                Volver a la app
            </a>
            <a class="nav-link" href="/cerrarSesion">
                Cerrar sesión
            </a>
        </nav>
    </aside>

    <!-- CONTENT -->
    <main class="content">

        <!-- HEADER USUARIO -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="h4 mb-1" th:text="${usuario.nombre}">Usuario</h2>
                <p class="mb-0" th:text="${usuario.email}">usuario@email.com</p>
            </div>

            <form th:action="@{/admin/toggleUsuario/{id}(id=${usuario.idusuario})}" method="post" class="d-inline">
                <button class="btn btn-danger btn-sm" th:if="${usuario.enabled}">
                    Desactivar usuario
                </button>
                <button class="btn btn-success btn-sm" th:unless="${usuario.enabled}">
                    Reactivar usuario
                </button>
            </form>
        </div>

        <!-- ROL -->
        <section class="card-section">
            <h3 class="h5 mb-3">Rol</h3>

            <form th:action="@{/admin/cambiarRol/{id}(id=${usuario.idusuario})}" method="post" class="d-flex gap-3 align-items-center">
                <select class="form-select w-auto" name="rol">
                    <option value="ADMIN">ADMIN</option>
                    <option value="GESTOR">GESTOR</option>
                    <option value="COLLABORATOR">COLLABORATOR</option>
                </select>
                <button class="btn btn-primary">Guardar rol</button>
            </form>
        </section>

        <!-- PROYECTOS -->
        <section class="card-section mt-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h3 class="h5 mb-0">Proyectos</h3>
                <a th:href="@{/admin/asignarProyecto/{id}(id=${usuario.idusuario})}" class="btn btn-primary btn-sm">
                    + Asignar proyecto
                </a>
            </div>

            <div class="item-list">
                <div class="item-card" th:each="p : ${proyectos}">
                    <span th:text="${p.proyecto.nombre}">Proyecto</span>

                    <!-- QUITAR PROYECTO -->
                    <form th:action="@{/admin/quitarProyecto}" method="post" class="d-inline">
                        <input type="hidden" name="idusuario" th:value="${usuario.idusuario}" />
                        <input type="hidden" name="idproyecto" th:value="${p.proyecto.idproyecto}" />
                        <button class="btn btn-danger btn-sm">Quitar</button>
                    </form>
                </div>
            </div>  
        </section>

    
    </main>

</div>

</body>
</html>
