<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar tarea</title>

    <!-- Bootstrap 5 -->
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">

    <!-- Favicon -->
    <link rel="shortcut icon" th:href="@{/media/logo_chill.svg}" type="image/x-icon">

    <!-- Estilos inline (tu estilo de admin) -->
    <style>
        :root {
            --bg-primary: #f8fafc;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --hover-bg: #f1f5f9;
            --sidebar-bg: #ffffff;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-dark);
        }

        .admin-layout {
            min-height: 100vh;
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            padding: 30px 20px;
            flex-shrink: 0;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            overflow-y: auto;
        }

        .sidebar h1 {
            font-size: 26px;
            margin-bottom: 40px;
            color: var(--text-dark);
        }

        .sidebar .nav-link {
            color: var(--text-muted);
            padding: 14px 16px;
            border-radius: 14px;
            transition: 0.2s;
            font-weight: 500;
        }

        .sidebar .nav-link:hover {
            background-color: var(--hover-bg);
            color: var(--text-dark);
        }

        /* CONTENT */
        .content {
            flex: 1;
            margin-left: 260px;
            padding: 40px;
        }

        @media (max-width: 900px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
            }
            .content {
                margin-left: 0;
                padding: 20px;
            }
            .admin-layout {
                flex-direction: column;
            }
        }

        /* CARD FORM */
        .form-card {
            background-color: white;
            border: 1px solid var(--border-color);
            border-radius: 22px;
            padding: 30px;
        }
    </style>
</head>

<body class="bg-body-tertiary">

<div class="admin-layout d-flex">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h1>ToDo Admin</h1>

        <nav class="nav flex-column">
            <a class="nav-link" href="/admin">
                Dashboard
            </a>
            <a class="nav-link" href="/admin/usuarios">
                Usuarios
            </a>
            <a class="nav-link" href="/admin/proyectos">
                Proyectos
            </a>
            <a class="nav-link" href="/menu">
                Volver a la app
            </a>
            <a class="nav-link" href="/cerrarSesion">
                Cerrar sesión
            </a>
        </nav>
    </aside>

    <!-- CONTENIDO -->
    <main class="content">

        <div class="page-header mb-4">
            <h2 class="h3 fw-bold mb-0">Editar tarea</h2>
        </div>

        <div class="form-card rounded-4 shadow-sm border">
            <form th:action="@{/admin/editarTarea/{id}(id=${tarea.idtarea})}" method="post" class="row g-4">

                <!-- TÍTULO -->
                <div class="col-12">
                    <label class="form-label">Título</label>
                    <input type="text"
                           class="form-control"
                           name="titulo"
                           th:value="${tarea.titulo}"
                           required>
                </div>

                <!-- DESCRIPCIÓN -->
                <div class="col-12">
                    <label class="form-label">Descripción</label>
                    <textarea class="form-control"
                              name="descripcion"
                              rows="3"
                              th:text="${tarea.descripcion}"
                              required>
                    </textarea>
                </div>

                <!-- PRIORIDAD -->
                <div class="col-md-6">
                    <label class="form-label">Prioridad</label>
                    <input type="number"
                           class="form-control"
                           name="prioridad"
                           min="1"
                           max="5"
                           th:value="${tarea.prioridad}"
                           required>
                </div>

                <!-- FECHA ENTREGA -->
                <div class="col-md-6">
                    <label class="form-label">Fecha entrega</label>
                    <input type="date"
                           class="form-control"
                           name="fecha_entrega"
                           th:value="${tarea.fechaentrega}">
                </div>

                <!-- ESTADO -->
                <div class="col-md-6">
                    <label class="form-label">Estado</label>
                    <select class="form-select" name="estado">
                        <option value="POR_HACER">Por hacer</option>
                        <option value="EN_PROGRESO">En progreso</option>
                        <option value="COMPLETADA">Completada</option>
                    </select>
                </div>

                <!-- USUARIO -->
                <div class="col-md-6">
                    <label class="form-label">Asignar usuario</label>
                    <select class="form-select" name="idusuario">
                        <option th:each="u : ${usuarios}"
                                th:value="${u.usuario.idusuario}"
                                th:selected="${u.usuario.idusuario == tarea.usuario.idusuario}"
                                th:text="${u.usuario.nombre}">
                        </option>
                    </select>
                </div>

                <!-- BOTÓN -->
                <div class="col-12">
                    <button class="btn btn-primary" type="submit">
                        Guardar cambios
                    </button>
                </div>
            </form>
        </div>

    </main>

</div>

</body>
</html>
