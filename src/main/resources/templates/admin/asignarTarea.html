<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Asignar tarea</title>

    <link rel="stylesheet" th:href="@{/css/admin.css}">

</head>

<body>

    <div class="admin-layout">

        <!-- ================= SIDEBAR ================= -->

        <aside class="sidebar">

            <h1>ToDo Admin</h1>

            <nav>

                <a href="/admin">
                    Dashboard
                </a>

                <a href="/admin/usuarios">
                    Usuarios
                </a>
                <a href="/admin/proyectos">
                    Proyectos
                </a>

                <a href="/menu">
                    Volver a la app
                </a>
                <a href="/cerrarSesion">
                    Cerrar sesión
                </a>

            </nav>

        </aside>

        <!-- ================= CONTENIDO ================= -->

        <main class="content">

            <div class="create-user-container">

                <h2>

                    Asignar tarea a
                    <span th:text="${usuario.nombre}"></span>

                </h2>

                <form th:action="@{/admin/asignarTarea}" method="post">

                    <!-- ID USUARIO -->

                    <input type="hidden" name="idusuario" th:value="${usuario.idusuario}">

                    <!-- SELECT TAREAS -->

                    <div class="form-group">

                        <label>Tarea</label>

                        <select name="idtarea" required>

                            <option value="">
                                Selecciona una tarea
                            </option>

                            <option th:each="t : ${tareas}" th:value="${t.idtarea}" th:text="${t.titulo}">
                            </option>

                        </select>

                    </div>

                    <button class="primary-btn" type="submit">

                        Asignar tarea

                    </button>

                </form>

            </div>

        </main>

    </div>

</body>

</html>
