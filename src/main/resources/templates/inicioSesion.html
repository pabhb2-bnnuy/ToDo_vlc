<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo App</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
    <link rel="shortcut icon" href="media/logo_chill.svg" type="image/x-icon">
</head>

<body class="text-white bg-black">
    <style>
        .bg-video {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: -1;
        }
    </style>

    <video autoplay muted loop playsinline class="bg-video">
        <source src="media/work.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <header class="fixed-top bg-dark bg-opacity-50">
        <div class="container py-3 d-flex align-items-center">
            <a href="/" class="d-inline-block">
                <img src="media/full_logoo.svg" alt="todo_main_logo" width="140" class="img-fluid">
            </a>
            <div><img th:src="@{/media/feria-valencia.svg}" alt="feria_valencia_logo" width="210px"></div>
        </div>
    </header>

    <main class="container min-vh-100 d-flex flex-column justify-content-between pt-5 pb-5"
        style="padding-top: 6rem !important; padding-bottom: 7.5rem !important;">
        <section class="flex-grow-1 d-flex justify-content-center align-items-center">
            <div class="card border-0 rounded-4 bg-dark bg-opacity-75 text-white w-100" style="max-width: 520px;">
                <div class="card-body p-4 p-md-5">
                    <h2 class="text-center fw-bold mb-4">Iniciar Sesión</h2>

                    <p th:if="${error}" th:text="${error}" class="text-danger fw-bold text-center mb-3"></p>

                    <form action="/inicioSesion" method="post" class="mx-auto d-grid gap-3" style="max-width: 320px;">
                        <div>
                            <label for="email" class="form-label">Email:</label>
                            <input type="email" class="form-control" name="mail" id="email" required>
                        </div>

                        <div>
                            <label for="passwd" class="form-label">Contraseña:</label>
                            <input type="password" class="form-control" name="password" id="passwd" required>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="remember-me" id="rememberMe">
                            <label class="form-check-label" for="rememberMe">
                                Recordar contraseña
                            </label>
                        </div>

                        <button type="submit" class="btn btn-info fw-bold text-dark w-100 py-2">
                            Entrar
                        </button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer class="fixed-bottom bg-dark bg-opacity-50">
        <div class="container py-4">
            <div class="d-flex justify-content-center align-items-center flex-wrap gap-3 text-white">
       
                <a href="https://github.com/Nicoaz25" target="_blank" rel="noopener"
                    class="d-inline-flex align-items-center text-white text-decoration-none gap-2">
                    <span>Nicolás Adriá</span>
                    <img th:src="@{/media/github_icon.svg}" alt="github_logo" width="20" height="20">
                </a>

                <a href="https://github.com/pabhb2-bnnuy" target="_blank" rel="noopener"
                    class="d-inline-flex align-items-center text-white text-decoration-none gap-2">
                    <span>Pablo Hermosilla</span>
                    <img th:src="@{/media/github_icon.svg}" alt="github_logo" width="20" height="20">
                </a>
            </div>
        </div>
    </footer>
</body>

</html>
