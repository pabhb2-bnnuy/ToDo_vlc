<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo App</title>
    <link rel="stylesheet" th:href="@{/css/form_style.css}">

    <link rel="shortcut icon" href="media/logo_chill.svg" type="image/x-icon">
</head>

<body>

    <!-- Video de fondo -->
    <video autoplay muted loop playsinline class="bg-video">
        <source src="media/mov_bbb.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <!-- Header -->
    <header class="top-bar">
        <a href="/">
            <div><img src="media/full_logoo.svg" alt="todo_main_logo" width="140px"></div>
        </a>
        
    </header>

    <!-- Contenedor principal -->
    <main class="container">
        <section class="hero">
            <div class="form-container">

                <h2>Iniciar Sesión</h2>

                <p th:if="${error}" th:text="${error}" style="color:red; font-weight:bold; margin-bottom:15px;">
                </p>

                <form action="/inicioSesion" method="post">

                    <div class="form-group">
                        <label>Email:</label>
                        <input type="email" name="mail" required>
                    </div>

                    <div class="form-group">
                        <label>Contraseña:</label>
                        <input type="password" name="password" required>
                    </div>
                    <div>
                        <label>
                            <input type="checkbox" name="remember-me">
                            Recordar contraseña
                        </label>
                    </div>
                    <br>
                    <div class="form-group">
                        <button type="submit">Entrar</button>
                    </div>

                </form>

            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="bottom-bar">
        <div>2026</div>
        <div><a href="https://github.com/Nicoaz25"><img src="media/github_icon.svg" alt="github_logo" width="20px"></a>
        </div>
        <div>IES La Sénia</div>
        <div><a href="https://github.com/pabhb2-bnnuy"><img src="media/github_icon.svg" alt="github_logo"
                    width="20px"></a></div>

    </footer>

</body>

</html>
