spring.application.name=vlc
spring.devtools.restart.enabled=true
spring.thymeleaf.cache=false

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.url=${SQL_URL}
spring.datasource.username=${SQL_USER}
spring.datasource.password=${SQL_PASS}

#For testing porpuses without docker
#spring.datasource.username=root
#spring.datasource.password=toor
#spring.datasource.url=jdbc:mysql://localhost:3306/todo_vlc


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

#A just in case security measure for JS.
server.servlet.session.cookie.http-only=true

#Sessions last 14 days by default